            "acceptedAnswer": {
              "@type": "Answer",
              "text": "É a delimitação do imóvel através de coordenadas geográficas certificadas pelo INCRA. É obrigatório para regularização, venda ou desmembramento de propriedades rurais, garantindo que não haja sobreposição de áreas."
